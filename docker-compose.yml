services:
  db:
    image: postgres:16
    container_name: bakalarka_demo_db
    restart: always
    environment:
      POSTGRES_DB: ludimus_demo
      POSTGRES_USER: ludimus_demo
      POSTGRES_PASSWORD: ludimus_demo_password
    ports:
      - "5433:5432"
    volumes:
      - bakalarka_demo_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bakalarka_demo_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - bakalarka_demo_redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bakalarka_demo_backend
    restart: always
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      TZ: Europe/Bratislava
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
      (python manage.py loaddata demo_data.json || true) &&
      daphne -b 0.0.0.0 -p 8000 dochadzka_backend.asgi:application"
    volumes:
      - ./media:/app/media

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bakalarka_demo_celery
    restart: always
    env_file:
      - .env
    environment:
      TZ: Europe/Bratislava
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: >
      celery -A dochadzka_backend worker
      -l info
      --max-tasks-per-child=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-200}
      --prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
    volumes:
      - ./media:/app/media

  celerybeat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bakalarka_demo_celerybeat
    restart: always
    env_file:
      - .env
    environment:
      TZ: Europe/Bratislava
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: celery -A dochadzka_backend beat -l info
    volumes:
      - ./media:/app/media

volumes:
  bakalarka_demo_postgres_data:
  bakalarka_demo_redis_data:

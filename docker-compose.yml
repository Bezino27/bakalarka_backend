services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      TZ: Europe/Bratislava
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
      gunicorn dochadzka_backend.wsgi:application --config gunicorn.conf.py"
    volumes:
      - ./media:/app/media
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      TZ: Europe/Bratislava
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: >
      celery -A dochadzka_backend worker
      -l info
      --max-tasks-per-child=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-200}
      --prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
    volumes:
      - ./media:/app/media
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

  celerybeat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      TZ: Europe/Bratislava
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: celery -A dochadzka_backend beat -l info
    volumes:
      - ./media:/app/media
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  redis_data:
